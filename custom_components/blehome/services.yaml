debug_status:
  name: Debug status
  description: Log BLEHome bluetooth proxy state for debugging.
  fields:
    entry_id:
      name: Entry ID
      description: Target config entry id (optional).
      required: false
      example: "1234567890abcdef"
      selector:
        text:
    mac:
      name: Gateway MAC
      description: Target gateway MAC address (optional).
      required: false
      example: "70:19:88:C9:27:89"
      selector:
        text:

debug_inject_bthome:
  name: Debug inject BTHome
  description: Inject a mock BTHome advertisement via the gateway.
  fields:
    entry_id:
      name: Entry ID
      description: Target config entry id (optional).
      required: false
      example: "1234567890abcdef"
      selector:
        text:
    mac:
      name: Gateway MAC
      description: Target gateway MAC address (optional).
      required: false
      example: "70:19:88:C9:27:89"
      selector:
        text:
    target_mac:
      name: Target device MAC
      description: Mock BTHome device MAC address (optional).
      required: false
      example: "AA:BB:CC:DD:EE:01"
      selector:
        text:
    temperature:
      name: Temperature (C)
      description: Mock temperature value in Celsius (optional).
      required: false
      example: 25.0
      selector:
        number:
          min: -40
          max: 85
          step: 0.01
          mode: box

remove_subdevice:
  name: Remove sub-device
  description: >
    Remove a mesh sub-device from the gateway and clean up its registries.
    Also sends an unprovision command to the device over the mesh network,
    removing it from the mesh. The sub-device's device and entities will
    be permanently deleted.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the gateway (optional if mac is provided).
      required: false
      example: "1234567890abcdef"
      selector:
        text:
    mac:
      name: Gateway MAC
      description: MAC address of the gateway (optional if entry_id is provided).
      required: false
      example: "70:19:88:C9:27:89"
      selector:
        text:
    mesh_address:
      name: Mesh address
      description: Mesh address of the sub-device to remove.
      required: true
      selector:
        number:
          min: 1
          max: 65535
          mode: box

ota_update:
  name: OTA update
  description: >
    Perform a firmware OTA update on a mesh node. The firmware file (.bin or .hex)
    must be accessible from the Home Assistant server.
    Progress is reported via blehome_ota_progress events.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID of the gateway (optional if mac is provided).
      required: false
      example: "1234567890abcdef"
      selector:
        text:
    mac:
      name: Gateway MAC
      description: MAC address of the gateway (optional if entry_id is provided).
      required: false
      example: "70:19:88:C9:27:89"
      selector:
        text:
    node_address:
      name: Node address
      description: Mesh address of the node to update.
      required: true
      selector:
        number:
          min: 1
          max: 65535
          mode: box
    firmware_path:
      name: Firmware path
      description: >
        Path or URL to the .bin/.hex firmware file. Supports absolute paths,
        paths relative to the HA config directory (e.g. "www/firmware.bin"),
        and HTTP/HTTPS URLs (e.g. "http://homeassistant.local:8123/local/firmware.bin").
      required: true
      selector:
        text:
